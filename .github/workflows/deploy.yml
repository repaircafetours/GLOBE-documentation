name: Build & deploy doc to GLOBE-website

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Docusaurus & deploy to GLOBE-website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout doc repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        run: bun run build

      - name: Deploy to GLOBE-website /doc
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: repaircafetours/GLOBE-website
          publish_branch: main
          publish_dir: ./build
          destination_dir: doc
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
